<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote Business</title>

  <style>
    /* Import MENANTE font (you need to provide the file) */
    @font-face {
      font-family: 'MENANTE';
      src: url('MENANTE.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      background-color: #000;
      color: #fff;
      font-family: 'MENANTE', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      border: 2px solid #fff;
      padding: 40px 60px;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>REMOTE BUSINESS</h1>
    <p>We operate fully remotely.</p>
  </div>

</body>
</html>
